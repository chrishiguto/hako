# cargo-deny: supply-chain lint (advisories, licenses, bans, sources).
# hako runs agents with secrets in VMs — keep this strict from day one.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]
# Scoped to individual permissively licensed transitive deps rather
# than allowed globally, so another crate under one of these licenses
# still gets flagged for review.
exceptions = [
    { crate = "foldhash", allow = ["Zlib"] },
    { crate = "borrow-or-share", allow = ["MIT-0"] },
    { crate = "matchit", allow = ["BSD-3-Clause"] },
]
# Workspace crates are publish = false and carry no license field yet;
# the repo license is a decision of its own.
private = { ignore = true }

[bans]
multiple-versions = "warn"
# Path deps between workspace crates have no version — not real wildcards.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
